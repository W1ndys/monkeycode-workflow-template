name: MonkeyCode 自动 Review

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: monkeycode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  create-review:
    name: 创建 MonkeyCode Review 任务
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ready-for-review')

    steps:
      - name: 获取 PR 关联的 Issue 编号
        id: extract_issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          issue_number="$(
            printf '%s' "$PR_BODY" \
              | grep -ioP '(?:closes|close|fixes|fix|resolves|resolve)\s+#\K[0-9]+' \
              | head -1
          )"

          if [ -z "$issue_number" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR 未关联 Issue，跳过"
            exit 0
          fi

          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          pr_url="https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUMBER}"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: 检查 Issue 是否带有 monkeycode 标签
        if: steps.extract_issue.outputs.skip != 'true'
        id: check_label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          has_label="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" \
              --jq '[.labels[].name] | any(. == "monkeycode")'
          )"
          echo "has_label=$has_label" >> "$GITHUB_OUTPUT"

      - name: 提取开发任务 ID（用于复用）
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        id: find_dev_task
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | (contains("monkeycode-ai.com/console/task/") and (contains("[MONKEYCODE_REVIEW_TASK]") | not) and (contains("[MONKEYCODE_PENDING_REVIEW]") | not))) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
            echo "找到开发任务: $task_id，将尝试复用"
          else
            echo "未找到开发任务，将创建新 Review 任务"
          fi

      - name: 提取已有 review 任务 ID
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        id: find_existing_review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | contains("[MONKEYCODE_REVIEW_TASK]")) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
            echo "已找到旧 Review 任务: $task_id"
          else
            echo "未找到已有 Review 任务"
          fi

      - name: 检出仓库代码
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        uses: actions/checkout@v6

      - name: 恢复 MonkeyCode 登录缓存
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        uses: actions/cache@v5
        with:
          path: .monkeycode-cookie-cache
          key: monkeycode-cookie-${{ github.repository }}

      - name: MonkeyCode 自动登录
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        id: login
        env:
          MONKEYCODE_EMAIL: ${{ secrets.MONKEYCODE_EMAIL }}
          MONKEYCODE_PASSWORD: ${{ secrets.MONKEYCODE_PASSWORD }}
        run: |
          python3 .github/scripts/monkeycode_login.py

      - name: 安装 WebSocket 依赖
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true' &&
          steps.login.outputs.login_success == 'true' &&
          steps.find_dev_task.outputs.task_id != ''
        run: |
          pip install --break-system-packages websocket-client

      - name: 尝试复用开发任务（重置上下文 + 发送 review 指令）
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true' &&
          steps.login.outputs.login_success == 'true' &&
          steps.find_dev_task.outputs.task_id != ''
        id: reuse_task
        env:
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          DEV_TASK_ID: ${{ steps.find_dev_task.outputs.task_id }}
          PR_URL: ${{ steps.extract_issue.outputs.pr_url }}
          ISSUE_URL: https://github.com/${{ github.repository }}/issues/${{ steps.extract_issue.outputs.issue_number }}
        run: |
          set +e

          # 构造 review 指令
          review_content="$(
            sed -e "s|{{PR_URL}}|${PR_URL}|g" \
                -e "s|{{ISSUE_URL}}|${ISSUE_URL}|g" \
              .github/prompts/review-instruction.md
          )"

          # 通过 WebSocket 重置上下文并发送 review 指令
          python3 .github/scripts/monkeycode_ws.py send \
            --task-id "$DEV_TASK_ID" \
            --cookie-file "$COOKIE_FILE" \
            --content "$review_content"
          ws_exit=$?

          if [ "$ws_exit" -eq 0 ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            task_url="https://monkeycode-ai.com/console/task/${DEV_TASK_ID}"
            echo "task_url=$task_url" >> "$GITHUB_OUTPUT"
            echo "task_id=$DEV_TASK_ID" >> "$GITHUB_OUTPUT"
            echo "复用开发任务成功，已重置上下文并发送 review 指令"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "复用开发任务失败（任务可能已停止或环境已回收），将回退到停止旧任务并新建任务"
          fi

      - name: 回退：创建新 MonkeyCode Review 任务
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true' &&
          steps.login.outputs.login_success == 'true' &&
          steps.reuse_task.outputs.success != 'true'
        id: create_review_task
        env:
          PR_URL: ${{ steps.extract_issue.outputs.pr_url }}
          ISSUE_URL: https://github.com/${{ github.repository }}/issues/${{ steps.extract_issue.outputs.issue_number }}
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          MONKEYCODE_MODEL_ID: ${{ vars.MONKEYCODE_MODEL_ID }}
          MONKEYCODE_IMAGE_ID: ${{ vars.MONKEYCODE_IMAGE_ID }}
          MONKEYCODE_PROJECT_ID: ${{ vars.MONKEYCODE_PROJECT_ID }}
        run: |
          set +e

          if [ -n "${{ steps.find_existing_review.outputs.task_id }}" ]; then
            echo "正在停止旧 Review 任务: ${{ steps.find_existing_review.outputs.task_id }}"
            response="$(
              curl -sS \
                -X PUT \
                "https://monkeycode-ai.com/api/v1/users/tasks/stop" \
                -H "accept: */*" \
                -H "content-type: application/json" \
                -b "$COOKIE_FILE" \
                --data-raw "{\"id\":\"${{ steps.find_existing_review.outputs.task_id }}\"}"
            )"
            code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
            if [ "$code" = "0" ]; then
              echo "旧 Review 任务已成功停止"
            else
              echo "旧 Review 任务停止失败 (code=$code)，继续创建新任务"
            fi
          fi

          echo "回退到停止旧任务并新建 Review 任务模式"

          content="$(
            sed -e "s|{{PR_URL}}|${PR_URL}|g" \
                -e "s|{{ISSUE_URL}}|${ISSUE_URL}|g" \
              .github/prompts/review-instruction.md
          )"

          payload="$(
            jq -cn \
              --arg content "$content" \
              --arg model_id "$MONKEYCODE_MODEL_ID" \
              --arg image_id "$MONKEYCODE_IMAGE_ID" \
              --arg project_id "$MONKEYCODE_PROJECT_ID" \
              '{
                content: $content,
                cli_name: "opencode",
                model_id: $model_id,
                image_id: $image_id,
                host_id: "public_host",
                repo: { branch: "main" },
                resource: { core: 2, memory: 8589934592, life: 7200 },
                extra: { project_id: $project_id },
                task_type: "develop"
              }'
          )"

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "https://monkeycode-ai.com/api/v1/users/tasks" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$COOKIE_FILE" \
              --data-raw "$payload"
          )"
          curl_exit=$?
          response="$(cat "$response_file")"

          task_id="$(printf '%s' "$response" | jq -r '.data.id // empty' 2>/dev/null)"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"

          if [ "$curl_exit" -ne 0 ] || [ "$code" != "0" ] || [ -z "$task_id" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "monkeycode_code=$code" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          task_url="https://monkeycode-ai.com/console/task/${task_id}"
          echo "task_url=$task_url" >> "$GITHUB_OUTPUT"
          echo "task_id=$task_id" >> "$GITHUB_OUTPUT"

      - name: 在 PR 下确认 Review 已触发
        if: >
          success() &&
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REUSE_SUCCESS: ${{ steps.reuse_task.outputs.success }}
          REUSE_TASK_URL: ${{ steps.reuse_task.outputs.task_url }}
          NEW_TASK_URL: ${{ steps.create_review_task.outputs.task_url }}
        run: |
          if [ "$REUSE_SUCCESS" = "true" ]; then
            task_url="$REUSE_TASK_URL"
            mode_info="复用开发任务环境，已重置上下文并发送 Review 指令。"
          else
            task_url="$NEW_TASK_URL"
            mode_info="已创建新的 Review 任务。"
          fi

          if [ -z "$task_url" ]; then
            exit 0
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '[MONKEYCODE_REVIEW_TASK]\n\nMonkeyCode Review 任务已创建，正在进行代码审查。\n\n- %s\n- Review 任务详情：%s' \
              "$mode_info" "$task_url")"

      - name: 评论 Review 创建失败
        if: >
          failure() &&
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "MonkeyCode Review 任务创建失败，请检查 workflow 日志。"
