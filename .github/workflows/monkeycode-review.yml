name: MonkeyCode 自动 Review

on:
  pull_request_review:
    types:
      - submitted
  pull_request:
    types:
      - labeled

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: monkeycode-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  create-review:
    name: 创建 MonkeyCode Review 任务
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ready-for-review')

    steps:
      - name: 获取 PR 关联的 Issue 编号
        id: extract_issue
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          issue_number="$(
            printf '%s' "$PR_BODY" \
              | grep -ioP '(?:closes|close|fixes|fix|resolves|resolve)\s+#\K[0-9]+' \
              | head -1
          )"

          if [ -z "$issue_number" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR 未关联 Issue，跳过"
            exit 0
          fi

          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

          pr_url="https://github.com/${GITHUB_REPOSITORY}/pull/${PR_NUMBER}"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: 检查 Issue 是否带有 monkeycode 标签
        if: steps.extract_issue.outputs.skip != 'true'
        id: check_label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          has_label="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" \
              --jq '[.labels[].name] | any(. == "monkeycode")'
          )"
          echo "has_label=$has_label" >> "$GITHUB_OUTPUT"

      - name: 提取已有 review 任务 ID
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        id: find_existing_review
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | contains("[MONKEYCODE_REVIEW_TASK]")) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
            echo "已找到旧 Review 任务: $task_id"
          else
            echo "未找到已有 Review 任务"
          fi

      - name: 检出仓库代码
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        uses: actions/checkout@v6

      - name: 恢复 MonkeyCode 登录缓存
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        uses: actions/cache@v5
        with:
          path: .monkeycode-cookie-cache
          key: monkeycode-cookie-${{ github.repository }}

      - name: MonkeyCode 自动登录
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        id: login
        env:
          MONKEYCODE_EMAIL: ${{ secrets.MONKEYCODE_EMAIL }}
          MONKEYCODE_PASSWORD: ${{ secrets.MONKEYCODE_PASSWORD }}
        run: |
          python3 .github/scripts/monkeycode_login.py

      - name: 停止旧 Review 任务
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true' &&
          steps.find_existing_review.outputs.task_id != '' &&
          steps.login.outputs.login_success == 'true'
        env:
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          TASK_ID: ${{ steps.find_existing_review.outputs.task_id }}
        run: |
          echo "正在停止旧 Review 任务: $TASK_ID"
          response="$(
            curl -sS \
              -X PUT \
              "https://monkeycode-ai.com/api/v1/users/tasks/stop" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$COOKIE_FILE" \
              --data-raw "{\"id\":\"${TASK_ID}\"}"
          )"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
          if [ "$code" = "0" ]; then
            echo "旧 Review 任务已成功停止"
          else
            echo "旧 Review 任务停止失败 (code=$code)，继续创建新任务"
          fi

      - name: 创建 MonkeyCode Review 任务
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true' &&
          steps.login.outputs.login_success == 'true'
        id: create_review_task
        env:
          PR_URL: ${{ steps.extract_issue.outputs.pr_url }}
          ISSUE_URL: https://github.com/${{ github.repository }}/issues/${{ steps.extract_issue.outputs.issue_number }}
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          MONKEYCODE_MODEL_ID: ${{ vars.MONKEYCODE_MODEL_ID }}
          MONKEYCODE_IMAGE_ID: ${{ vars.MONKEYCODE_IMAGE_ID }}
          MONKEYCODE_PROJECT_ID: ${{ vars.MONKEYCODE_PROJECT_ID }}
        run: |
          set +e

          content="$(
            sed -e "s|{{PR_URL}}|${PR_URL}|g" \
                -e "s|{{ISSUE_URL}}|${ISSUE_URL}|g" \
              .github/prompts/review-instruction.md
          )"

          payload="$(
            jq -cn \
              --arg content "$content" \
              --arg model_id "$MONKEYCODE_MODEL_ID" \
              --arg image_id "$MONKEYCODE_IMAGE_ID" \
              --arg project_id "$MONKEYCODE_PROJECT_ID" \
              '{
                content: $content,
                cli_name: "opencode",
                model_id: $model_id,
                image_id: $image_id,
                host_id: "public_host",
                repo: { branch: "main" },
                resource: { core: 2, memory: 8589934592, life: 7200 },
                extra: { project_id: $project_id },
                task_type: "develop"
              }'
          )"

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "https://monkeycode-ai.com/api/v1/users/tasks" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$COOKIE_FILE" \
              --data-raw "$payload"
          )"
          curl_exit=$?
          response="$(cat "$response_file")"

          task_id="$(printf '%s' "$response" | jq -r '.data.id // empty' 2>/dev/null)"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"

          if [ "$curl_exit" -ne 0 ] || [ "$code" != "0" ] || [ -z "$task_id" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "monkeycode_code=$code" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          task_url="https://monkeycode-ai.com/console/task/${task_id}"
          echo "task_url=$task_url" >> "$GITHUB_OUTPUT"

      - name: 评论 Review 任务链接
        if: >
          success() &&
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
          REPOSITORY: ${{ github.repository }}
          TASK_URL: ${{ steps.create_review_task.outputs.task_url }}
          PR_URL: ${{ steps.extract_issue.outputs.pr_url }}
        run: |
          gh api "repos/${REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -X POST \
            -f body="$(printf '[MONKEYCODE_REVIEW_TASK]\n\nMonkeyCode Review 任务已创建\n\n- Review 任务详情：%s\n- 关联 PR：%s' \
              "$TASK_URL" "$PR_URL")"

      - name: 在 PR 下确认 Review 已触发
        if: >
          success() &&
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TASK_URL: ${{ steps.create_review_task.outputs.task_url }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf 'MonkeyCode Review 任务已创建，正在进行代码审查。\n\n- Review 任务详情：%s' \
              "$TASK_URL")"

      - name: 评论 Review 创建失败
        if: >
          failure() &&
          steps.extract_issue.outputs.skip != 'true' &&
          steps.check_label.outputs.has_label == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "MonkeyCode Review 任务创建失败，请检查 workflow 日志。"
