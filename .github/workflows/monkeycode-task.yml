name: MonkeyCode 自动开发任务

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: read
  issues: write

concurrency:
  group: monkeycode-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-task:
    name: 创建 MonkeyCode 任务
    runs-on: ubuntu-latest
    if: >
      contains(github.event.issue.labels.*.name, 'monkeycode') &&
      (github.event.action == 'opened' ||
       (github.event.action == 'labeled' && github.event.label.name == 'monkeycode'))

    steps:
      - name: 检查已有 MonkeyCode 任务评论
        id: find_existing
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          exists="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq 'any(.[]; (.body // "") | contains("https://monkeycode-ai.com/console/task/"))'
          )"

          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: 评论检测标记
        if: steps.find_existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "检测到 Issue #${ISSUE_NUMBER}「${ISSUE_TITLE}」带有 \`monkeycode\` 标签，MonkeyCode 自动开发工作流已触发，正在准备创建任务..."

      - name: 校验配置
        if: steps.find_existing.outputs.exists != 'true'
        id: check_config
        env:
          MONKEYCODE_COOKIE: ${{ secrets.MONKEYCODE_COOKIE }}
          MONKEYCODE_MODEL_ID: ${{ vars.MONKEYCODE_MODEL_ID }}
          MONKEYCODE_IMAGE_ID: ${{ vars.MONKEYCODE_IMAGE_ID }}
          MONKEYCODE_PROJECT_ID: ${{ vars.MONKEYCODE_PROJECT_ID }}
        run: |
          missing=()

          if [ -z "$MONKEYCODE_COOKIE" ]; then
            missing+=("MONKEYCODE_COOKIE secret")
          fi

          if [ -z "$MONKEYCODE_MODEL_ID" ]; then
            missing+=("MONKEYCODE_MODEL_ID variable")
          fi

          if [ -z "$MONKEYCODE_IMAGE_ID" ]; then
            missing+=("MONKEYCODE_IMAGE_ID variable")
          fi

          if [ -z "$MONKEYCODE_PROJECT_ID" ]; then
            missing+=("MONKEYCODE_PROJECT_ID variable")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'missing=%s\n' "${missing[*]}" >> "$GITHUB_OUTPUT"
            printf '缺少 MonkeyCode 配置：%s\n' "${missing[*]}" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: 检测 MonkeyCode Cookie
        if: steps.find_existing.outputs.exists != 'true'
        id: check_cookie
        env:
          MONKEYCODE_COOKIE: ${{ secrets.MONKEYCODE_COOKIE }}
        run: |
          set +e

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              "https://monkeycode-ai.com/api/v1/users/subscription" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$MONKEYCODE_COOKIE"
          )"
          curl_exit=$?
          response="$(cat "$response_file")"
          rm -f "$response_file"

          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
          message="$(printf '%s' "$response" | jq -r '.message // empty' 2>/dev/null)"
          plan="$(printf '%s' "$response" | jq -r '.data.plan // empty' 2>/dev/null)"
          expires_at="$(printf '%s' "$response" | jq -r '.data.expires_at // empty' 2>/dev/null)"

          {
            echo "http_status=$status"
            echo "curl_exit=$curl_exit"
            echo "monkeycode_code=$code"
            echo "monkeycode_message=$message"
            echo "plan=$plan"
            echo "expires_at=$expires_at"
          } >> "$GITHUB_OUTPUT"

          if [ "$curl_exit" -ne 0 ]; then
            exit 1
          fi

          if [ "$status" = "401" ] || printf '%s' "$response" | grep -qi 'Unauthorized'; then
            echo "unauthorized=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$code" != "0" ]; then
            exit 1
          fi

          printf 'MonkeyCode Cookie 可用，订阅：%s，到期：%s\n' "$plan" "$expires_at" >> "$GITHUB_STEP_SUMMARY"

      - name: 创建 MonkeyCode 开发任务
        if: steps.find_existing.outputs.exists != 'true' && steps.check_cookie.outcome == 'success'
        id: create_task
        env:
          ISSUE_URL: ${{ github.event.issue.html_url }}
          MONKEYCODE_COOKIE: ${{ secrets.MONKEYCODE_COOKIE }}
          MONKEYCODE_MODEL_ID: ${{ vars.MONKEYCODE_MODEL_ID }}
          MONKEYCODE_IMAGE_ID: ${{ vars.MONKEYCODE_IMAGE_ID }}
          MONKEYCODE_PROJECT_ID: ${{ vars.MONKEYCODE_PROJECT_ID }}
          MONKEYCODE_TASK_PROMPT: ${{ vars.MONKEYCODE_TASK_PROMPT }}
        run: |
          set +e

          # 支持自定义 prompt，未配置时使用默认模板
          # 默认 prompt 中的 commit 作者信息请根据实际情况修改
          if [ -n "$MONKEYCODE_TASK_PROMPT" ]; then
            content="${MONKEYCODE_TASK_PROMPT}，issues链接为${ISSUE_URL}"
          else
            content="新开一个分支完成这个任务，完成之后提交推送并发起pr，请直接在修改代码之前发起PR，然后再每次提交直接提交推送到PR，开发任务完成之后自己进行一次review，issues链接为${ISSUE_URL}"
          fi

          payload="$(
            jq -cn \
              --arg content "$content" \
              --arg model_id "$MONKEYCODE_MODEL_ID" \
              --arg image_id "$MONKEYCODE_IMAGE_ID" \
              --arg project_id "$MONKEYCODE_PROJECT_ID" \
              '{
                content: $content,
                cli_name: "opencode",
                model_id: $model_id,
                image_id: $image_id,
                host_id: "public_host",
                repo: {
                  branch: "main"
                },
                resource: {
                  core: 2,
                  memory: 8589934592,
                  life: 7200
                },
                extra: {
                  project_id: $project_id
                },
                task_type: "develop"
              }'
          )"

          response_file="$(mktemp)"
          status="$(
            curl -sS \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST "https://monkeycode-ai.com/api/v1/users/tasks" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -H "origin: https://monkeycode-ai.com" \
              -b "$MONKEYCODE_COOKIE" \
              --data-raw "$payload"
          )"
          curl_exit=$?
          response="$(cat "$response_file")"
          rm -f "$response_file"

          task_id="$(printf '%s' "$response" | jq -r '.data.id // empty' 2>/dev/null)"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
          message="$(printf '%s' "$response" | jq -r '.message // empty' 2>/dev/null)"

          {
            echo "http_status=$status"
            echo "curl_exit=$curl_exit"
            echo "monkeycode_code=$code"
            echo "monkeycode_message=$message"
          } >> "$GITHUB_OUTPUT"

          if [ "$curl_exit" -ne 0 ]; then
            exit 1
          fi

          if [ "$status" = "401" ] || printf '%s' "$response" | grep -qi 'Unauthorized'; then
            echo "unauthorized=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          if [ "$code" != "0" ] || [ -z "$task_id" ]; then
            exit 1
          fi

          task_url="https://monkeycode-ai.com/console/task/${task_id}"
          echo "task_url=$task_url" >> "$GITHUB_OUTPUT"

      - name: 评论任务链接
        if: success() && steps.find_existing.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          TASK_URL: ${{ steps.create_task.outputs.task_url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "MonkeyCode 开发任务已开始执行，详情请查看：${TASK_URL}"

      - name: 评论 Cookie 过期
        if: >
          failure() &&
          steps.check_config.outcome == 'success' &&
          ((steps.check_cookie.outcome == 'failure' && steps.check_cookie.outputs.unauthorized == 'true') ||
           (steps.create_task.outcome == 'failure' && steps.create_task.outputs.unauthorized == 'true'))
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "MonkeyCode 创建任务失败：Cookie 已过期，请重新抓取并更新仓库 Secret \`MONKEYCODE_COOKIE\`。"

      - name: 评论配置缺失
        if: failure() && steps.check_config.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          MISSING_CONFIG: ${{ steps.check_config.outputs.missing }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "MonkeyCode 创建任务失败：仓库缺少配置 ${MISSING_CONFIG}。请补齐后重新添加 \`monkeycode\` 标签触发。"

      - name: 评论 Cookie 检测失败
        if: failure() && steps.check_config.outcome == 'success' && steps.check_cookie.outcome == 'failure' && steps.check_cookie.outputs.unauthorized != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          HTTP_STATUS: ${{ steps.check_cookie.outputs.http_status }}
          CURL_EXIT: ${{ steps.check_cookie.outputs.curl_exit }}
          MONKEYCODE_CODE: ${{ steps.check_cookie.outputs.monkeycode_code }}
          MONKEYCODE_MESSAGE: ${{ steps.check_cookie.outputs.monkeycode_message }}
        run: |
          body="$(
            cat <<EOF
          MonkeyCode Cookie 检测失败，请检查 workflow 日志。

          HTTP 状态码：${HTTP_STATUS:-未获取}
          curl 退出码：${CURL_EXIT:-未获取}
          MonkeyCode code：${MONKEYCODE_CODE:-未获取}
          MonkeyCode message：${MONKEYCODE_MESSAGE:-未获取}
          EOF
          )"

          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "$body"

      - name: 评论创建失败
        if: failure() && steps.check_config.outcome == 'success' && steps.create_task.outcome == 'failure' && steps.create_task.outputs.unauthorized != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPOSITORY: ${{ github.repository }}
          HTTP_STATUS: ${{ steps.create_task.outputs.http_status }}
          CURL_EXIT: ${{ steps.create_task.outputs.curl_exit }}
          MONKEYCODE_CODE: ${{ steps.create_task.outputs.monkeycode_code }}
          MONKEYCODE_MESSAGE: ${{ steps.create_task.outputs.monkeycode_message }}
        run: |
          body="$(
            cat <<EOF
          MonkeyCode 创建任务失败，请检查 workflow 日志。

          HTTP 状态码：${HTTP_STATUS:-未获取}
          curl 退出码：${CURL_EXIT:-未获取}
          MonkeyCode code：${MONKEYCODE_CODE:-未获取}
          MonkeyCode message：${MONKEYCODE_MESSAGE:-未获取}
          EOF
          )"

          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "$body"
