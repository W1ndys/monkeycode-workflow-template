name: MonkeyCode 开发完成确认

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: monkeycode-confirm-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  confirm-dev-complete:
    name: 标记开发完成并等待确认
    runs-on: ubuntu-latest
    if: >
      !github.event.issue.pull_request &&
      contains(github.event.issue.labels.*.name, 'monkeycode') &&
      contains(github.event.comment.body, '[MONKEYCODE_TASK_COMPLETE]')

    steps:
      - name: 检查是否已有待确认评论
        id: find_existing_confirm
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          exists="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq 'any(.[]; (.body // "") | contains("[MONKEYCODE_PENDING_REVIEW]"))'
          )"
          echo "exists=$exists" >> "$GITHUB_OUTPUT"

      - name: 从 Issue 评论提取 PR 链接
        if: steps.find_existing_confirm.outputs.exists != 'true'
        id: extract_pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          pr_url="$(
            printf '%s' "$COMMENT_BODY" \
              | grep -oP 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' \
              | head -1
          )"

          if [ -z "$pr_url" ]; then
            pr_url="$(
              gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
                --paginate \
                --jq '[.[] | select((.body // "") | test("https://github\\.com/.+/pull/[0-9]+")) | .body] | last // empty' \
              | grep -oP 'https://github\.com/[^/]+/[^/]+/pull/[0-9]+' \
              | head -1
            )"
          fi

          if [ -z "$pr_url" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "未找到关联 PR 链接，跳过"
            exit 0
          fi

          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          pr_number="$(printf '%s' "$pr_url" | grep -oP '[0-9]+$')"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: 从 Issue 评论提取开发任务 ID
        if: steps.find_existing_confirm.outputs.exists != 'true' && steps.extract_pr.outputs.skip != 'true'
        id: extract_dev_task
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | (contains("monkeycode-ai.com/console/task/") and (contains("[MONKEYCODE_REVIEW_TASK]") | not) and (contains("[MONKEYCODE_PENDING_REVIEW]") | not))) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          else
            echo "未找到开发任务 ID"
          fi

      # 注意：不再停止开发任务，保留 VM 环境供 review 阶段复用

      - name: 在 PR 下发表待确认评论
        if: >
          steps.find_existing_confirm.outputs.exists != 'true' &&
          steps.extract_pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.extract_pr.outputs.pr_number }}
          DEV_TASK_ID: ${{ steps.extract_dev_task.outputs.task_id }}
        run: |
          task_info=""
          if [ -n "$DEV_TASK_ID" ]; then
            task_info="开发任务环境已保留，Review 时将复用同一环境（无需重建），节省启动时间。"
          else
            task_info="未找到关联的开发任务，Review 将创建新任务。"
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '[MONKEYCODE_PENDING_REVIEW]\n\n## MonkeyCode 开发任务已完成\n\n%s\n\n请检查 PR 中的代码改动，确认无误后通过以下任一方式触发 MonkeyCode Review：\n\n1. 在 PR 页面点击 **Approve** 审批通过\n2. 给 PR 添加 `ready-for-review` 标签' \
              "$task_info")"

      - name: 在 Issue 下标记开发完成
        if: >
          steps.find_existing_confirm.outputs.exists != 'true' &&
          steps.extract_pr.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          PR_URL: ${{ steps.extract_pr.outputs.pr_url }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -X POST \
            -f body="$(printf '[MONKEYCODE_PENDING_REVIEW]\n\nMonkeyCode 开发任务已完成，等待开发者确认后触发 Review。\n\n- 关联 PR：%s\n- 请前往 PR 页面检查代码，通过 Approve 审批或添加 `ready-for-review` 标签触发 Review。' \
              "$PR_URL")"
