name: MonkeyCode PR 关闭终止任务

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  stop-task:
    name: 终止 MonkeyCode 任务
    runs-on: ubuntu-latest

    steps:
      - name: 判断 PR 关闭类型
        id: pr_state
        run: |
          echo "is_merged=${{ github.event.pull_request.merged }}" >> "$GITHUB_OUTPUT"

      - name: 从 PR 提取关联 Issue 编号
        id: extract_issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          issue_number="$(
            printf '%s' "$PR_BODY" \
              | grep -ioP '(?:closes|close|fixes|fix|resolves|resolve)\s+#\K[0-9]+' \
              | head -1
          )"

          if [ -z "$issue_number" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "PR 未关联 Issue，跳过终止流程"
            exit 0
          fi

          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: 从 Issue 评论提取开发任务 ID
        if: steps.extract_issue.outputs.skip != 'true'
        id: extract_dev_task
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | (contains("monkeycode-ai.com/console/task/") and (contains("[MONKEYCODE_REVIEW_TASK]") | not) and (contains("[MONKEYCODE_PENDING_REVIEW]") | not))) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          else
            echo "未找到开发任务 ID"
          fi

      - name: 从 Issue 评论提取 Review 任务 ID
        if: steps.extract_issue.outputs.skip != 'true'
        id: extract_review_task
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
        run: |
          task_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
              --paginate \
              --jq '[.[] | select((.body // "") | contains("[MONKEYCODE_REVIEW_TASK]")) | .body] | last // empty' \
            | grep -oP 'monkeycode-ai\.com/console/task/\K[0-9a-f-]+' \
            | head -1
          )"

          if [ -n "$task_id" ]; then
            echo "task_id=$task_id" >> "$GITHUB_OUTPUT"
          else
            echo "未找到 Review 任务 ID"
          fi

      - name: 检出仓库代码
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          (steps.extract_dev_task.outputs.task_id != '' || steps.extract_review_task.outputs.task_id != '')
        uses: actions/checkout@v6

      - name: 恢复 MonkeyCode 登录缓存
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          (steps.extract_dev_task.outputs.task_id != '' || steps.extract_review_task.outputs.task_id != '')
        uses: actions/cache@v5
        with:
          path: .monkeycode-cookie-cache
          key: monkeycode-cookie-${{ github.repository }}

      - name: MonkeyCode 自动登录
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          (steps.extract_dev_task.outputs.task_id != '' || steps.extract_review_task.outputs.task_id != '')
        id: login
        env:
          MONKEYCODE_EMAIL: ${{ secrets.MONKEYCODE_EMAIL }}
          MONKEYCODE_PASSWORD: ${{ secrets.MONKEYCODE_PASSWORD }}
        run: |
          if [ -z "$MONKEYCODE_EMAIL" ] || [ -z "$MONKEYCODE_PASSWORD" ]; then
            echo "MONKEYCODE_EMAIL 或 MONKEYCODE_PASSWORD 未配置，跳过终止"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 .github/scripts/monkeycode_login.py

      - name: 终止开发任务
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.extract_dev_task.outputs.task_id != '' &&
          steps.login.outputs.skip != 'true' &&
          steps.login.outputs.login_success == 'true'
        id: stop_dev
        env:
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          TASK_ID: ${{ steps.extract_dev_task.outputs.task_id }}
        run: |
          response="$(
            curl -sS \
              -X PUT \
              "https://monkeycode-ai.com/api/v1/users/tasks/stop" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$COOKIE_FILE" \
              --data-raw "{\"id\":\"${TASK_ID}\"}"
          )"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
          if [ "$code" = "0" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "开发任务终止失败: code=$code"
          fi

      - name: 终止 Review 任务
        if: >
          steps.extract_issue.outputs.skip != 'true' &&
          steps.extract_review_task.outputs.task_id != '' &&
          steps.login.outputs.skip != 'true' &&
          steps.login.outputs.login_success == 'true'
        id: stop_review
        env:
          COOKIE_FILE: ${{ steps.login.outputs.cookie_file }}
          TASK_ID: ${{ steps.extract_review_task.outputs.task_id }}
          DEV_TASK_ID: ${{ steps.extract_dev_task.outputs.task_id }}
        run: |
          # 如果 review 任务 ID 和开发任务 ID 相同（复用模式），跳过重复停止
          if [ "$TASK_ID" = "$DEV_TASK_ID" ]; then
            echo "Review 任务与开发任务相同（复用模式），已在上一步停止"
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "reused=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          response="$(
            curl -sS \
              -X PUT \
              "https://monkeycode-ai.com/api/v1/users/tasks/stop" \
              -H "accept: */*" \
              -H "content-type: application/json" \
              -b "$COOKIE_FILE" \
              --data-raw "{\"id\":\"${TASK_ID}\"}"
          )"
          code="$(printf '%s' "$response" | jq -r '.code // empty' 2>/dev/null)"
          if [ "$code" = "0" ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "Review 任务终止失败: code=$code"
          fi

      - name: 在 PR 下评论终止结果
        if: steps.extract_issue.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEV_SUCCESS: ${{ steps.stop_dev.outputs.success }}
          REVIEW_SUCCESS: ${{ steps.stop_review.outputs.success }}
          DEV_TASK_ID: ${{ steps.extract_dev_task.outputs.task_id }}
          REVIEW_TASK_ID: ${{ steps.extract_review_task.outputs.task_id }}
          IS_MERGED: ${{ steps.pr_state.outputs.is_merged }}
          REVIEW_REUSED: ${{ steps.stop_review.outputs.reused }}
        run: |
          if [ "$IS_MERGED" = "true" ]; then
            body="MonkeyCode 任务终止报告（PR 已合并）\n\n"
          else
            body="MonkeyCode 任务终止报告（PR 已关闭，未合并）\n\n"
          fi

          if [ -n "$DEV_TASK_ID" ]; then
            if [ "$DEV_SUCCESS" = "true" ]; then
              body="${body}- 开发任务：已成功终止\n"
            else
              body="${body}- 开发任务：终止失败，请手动处理\n"
            fi
          else
            body="${body}- 开发任务：未找到关联任务\n"
          fi

          if [ -n "$REVIEW_TASK_ID" ]; then
            if [ "$REVIEW_REUSED" = "true" ]; then
              body="${body}- Review 任务：与开发任务共用同一环境，已一并终止\n"
            elif [ "$REVIEW_SUCCESS" = "true" ]; then
              body="${body}- Review 任务：已成功终止\n"
            else
              body="${body}- Review 任务：终止失败，请手动处理\n"
            fi
          else
            body="${body}- Review 任务：未找到关联任务\n"
          fi

          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '%b' "$body")"

      - name: 评论并关闭关联 Issue（PR 合并时）
        if: steps.extract_issue.outputs.skip != 'true' && steps.pr_state.outputs.is_merged == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf 'MonkeyCode 开发任务已完成，PR #%s（%s）已合并，相关任务已终止，本 Issue 自动关闭。' \
              "$PR_NUMBER" "$PR_TITLE")"

          gh issue close "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --reason completed

      - name: 评论关联 Issue（PR 关闭未合并时）
        if: steps.extract_issue.outputs.skip != 'true' && steps.pr_state.outputs.is_merged != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.extract_issue.outputs.issue_number }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf 'PR #%s（%s）已关闭（未合并），关联的 MonkeyCode 开发和 Review 任务已终止。如需继续开发，请重新创建 PR 或 Issue。' \
              "$PR_NUMBER" "$PR_TITLE")"

      - name: 删除关联分支
        if: steps.extract_issue.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [ "$HEAD_REF" != "main" ] && [ "$HEAD_REF" != "master" ]; then
            gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/${HEAD_REF}" \
              -X DELETE 2>/dev/null \
              && echo "已删除分支: $HEAD_REF" \
              || echo "分支删除失败或已不存在: $HEAD_REF"
          fi
